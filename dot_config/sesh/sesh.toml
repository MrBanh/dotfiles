#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

blacklist = ["claude ", 'floating\|', 'sidekick\|']

[[window]]
name = "opencode"
startup_script = "opencode --continue"

[default_session]
startup_command = "nvim -c ':lua Snacks.explorer({ focus = \"list\" })'"
preview_command = "eza --all --git --icons --long --group-directories-first --color=always {}"

[[session]]
name = "chezmoi"
path = "~/.local/share/chezmoi"
startup_command = "chezmoi re-add && lazygit && tmux kill-session"

[[session]]
name = "downloads"
path = "~/Downloads"
startup_command = "ls"

[[session]]
name = "nvim config"
path = "~/.config/nvim/"
startup_command = "nvim"

[[session]]
name = "opencode config"
path = "~/.config/opencode/"
startup_command = "nvim"

[[session]]
name = "sesh config"
path = "~/.config/sesh"
startup_command = "nvim sesh.toml"
preview_command = "bat --color=always ~/.config/sesh/sesh.toml"

[[session]]
name = "starship config"
path = "~/.config"
startup_command = "nvim starship.toml"
preview_command = "bat --color=always ~/.config/starship.toml"

[[session]]
name = "tmux config"
path = "~/.config/tmux/"
startup_command = "nvim"

[[session]]
name = "zsh config"
path = "~/"
startup_command = "nvim .zshrc"
preview_command = "bat --color=always ~/.zshrc"

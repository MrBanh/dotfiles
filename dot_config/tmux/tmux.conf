# vim style tmux config
# Credits to: https://gist.github.com/tsl0922/d79fc1f8097dde660b34
# Place in ~/ folder -> activate tmux -> run `tmux source ~/.tmux.conf`

# use C-space as the prefix key
set-option -g prefix C-w
unbind-key C-w
set-option -g prefix C-Space
bind-key C-Space send-prefix

# window index start at 1, easier to prefix + number
set -g base-index 1 
set -g renumber-windows on

# Easy config reload
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# vim key bindings in copy mode
setw -g mode-keys vi

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
# set -sg escape-time 5

# mouse behavior
setw -g mouse on

set -g set-clipboard on

set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'

bind-key : command-prompt
bind-key r refresh-client

bind -r j resize-pane -D 1
bind -r k resize-pane -U 1
bind -r l resize-pane -R 1
bind -r h resize-pane -L 1

# Send keys to lazygit if in lazygit
is_lazygit="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?lazygit$'"

# Send keys to yazi if in yazi
is_yazi="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?yazi$'"

# smart pane switching with awareness of vim splits
## https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "($is_lazygit) || ($is_vim) || ($is_yazi)" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "($is_lazygit) || ($is_vim) || ($is_yazi)" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "($is_lazygit) || ($is_vim) || ($is_yazi)" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "($is_lazygit) || ($is_vim) || ($is_yazi)" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }
bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

# use vim-like keys for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key c kill-pane
bind-key n new-window

# Change pane layout
bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical

# Search in copy mode
bind-key / copy-mode \; send-keys /
bind-key ? copy-mode \; send-keys ?

# Copy/paste-buffer mode
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
bind-key [ if-shell "$is_vim" { send-keys C-Space [ } { copy-mode }
bind-key p paste-buffer

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# fzf prompt for tmux sessions with sesh: https://github.com/joshmedeski/sesh
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '  ' \
    --style 'minimal' \
    --header '  ^a all ^t tmux ^g configs ^d zoxide ^x tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-d:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-x:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}' \
    --gutter ' '
)\""

set -g detach-on-destroy off  # don't exit from tmux when closing a session

# prefix+L won't find the last session if detach-on-destroy is off. This finds the 2nd last session
bind -N "last-session (via sesh) " L run-shell "sesh last" 

# Floating tmux session with C-/ (not C-_), scoped per session
bind-key "C-_" if-shell -F '#{m:floating|*,#{session_name}}' {
  detach-client
} {
  run-shell "tmux display-popup -w 60% -h 60% -b rounded -E 'tmux new-session -A -s \"floating|#{session_name}\"'"
}

# Open opencode in new tmux window
bind-key M-/ if-shell "command -v opencode" { new-window -c "#{pane_current_path}" "opencode --continue" } { display-message "opencode not found" }

# Navigate next/previous window
bind-key k previous-window
bind-key j next-window

set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80
set-window-option -g display-panes-time 1500

set-option -g focus-events on

# Update PATH for tmux run-shell, so that it can find fzf and other tools
set-option -g update-environment "PATH"

# Status Bar
set-option -g status-interval 5

# Set window notifications
setw -g monitor-activity off

# Pass through image preview
set -gq allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g visual-activity off

if-shell '[ "$(uname -s)" = "Darwin" ]' ' \
  # Enable native Mac OS X copy/paste
  set-option -g default-command "reattach-to-user-namespace -l $SHELL"; \
'

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-h"

set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-yank'
bind -T copy-mode    C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"

# TMUX UI
set -g @plugin 'tmux-plugins/tmux-cpu'

## Theme colors (Everforest palette, matching NvChad base46 everforest)
set -gq @thm_red "#e67e80"
set -gq @thm_purple "#ecafcc"
set -gq @thm_peach "#e69875"
set -gq @thm_yellow "#dbbc7f"
set -gq @thm_green "#83c092"
set -gq @thm_blue "#7393b3"
set -gq @thm_text "#d3c6aa"
set -gq @thm_line "#3a4248"

## Status bar style (transparent background)
set -g status-style "bg=default,fg=#{@thm_text}"

## Pane border
set -g pane-border-status off
set -g pane-border-format ""
set -g pane-border-lines single
set -g pane-border-indicators off
set -g pane-border-style "fg=#{@thm_line}"
set -g pane-active-border-style "fg=#{@thm_line}"

## Window status (centered)
set -g status-position top
set -g status-justify "absolute-centre"
set -g window-status-format "#[bg=default,fg=#{@thm_peach}]#{?#{!=:#{window_name},}, #I #W,} "
set -g window-status-current-format "#[bg=default,fg=#{@thm_peach},bold,blink] #{?#{!=:#{window_name},},\[#I #W\],} "
set -g window-status-separator ""

## Left status
set -g status-left-length 100
set -g status-left " "
set -ga status-left "#{?client_prefix,#[fg=#{@thm_purple}]󰇘 PREFIX,#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow}] COPY  ,#[fg=#{@thm_blue} blink]█ #[noblink]NORMAL}} "
set -ga status-left "#[bg=default,fg=#{@thm_green}]   #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_red}]   #S "

## Right status
set -g status-right-length 100
set -g status-right ""

### https://github.com/tmux-plugins/tmux-cpu
set -g @cpu_icon " "
set -g @cpu_low_icon " "
set -g @cpu_medium_icon " "
set -g @cpu_high_icon " "
set -ga status-right "#[bg=default,fg=#{@thm_red}] #{cpu_icon} #{cpu_percentage} "
set -g @ram_icon " "
set -g @ram_low_icon " "
set -g @ram_medium_icon " "
set -g @ram_high_icon " "
set -ga status-right "#[bg=default,fg=#{@thm_green}] #{ram_icon} #{ram_percentage} "
set -g @gpu_icon " "
set -g @gpu_low_icon " "
set -g @gpu_medium_icon " "
set -g @gpu_high_icon " "
set -ga status-right "#[bg=default,fg=#{@thm_blue}] #{gpu_icon} #{gpu_percentage} "
set -ga status-right " "

## Popup style
set -g popup-style bg=default
set -g popup-border-style "fg=#{@thm_line}"

## Add padding to top of status
if -F '#{!=:#{status},3}' {
  # Creates 3-line status bar
  set -g status 3

  # sets second (middle) line to the tmux status from the first line
  set -Fg 'status-format[1]' '#{status-format[0]}'

  # set first and third lines to empty, giving us a "padding"
  set -g status-format[0] ''
  set -g status-format[2] ''
}

## Automatically rename windows to match the current command
set -wg automatic-rename on
set -g automatic-rename-format "Window"

# Initialize TMUX plugin manager (keep the run line at the very bottom of tmux.conf)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'


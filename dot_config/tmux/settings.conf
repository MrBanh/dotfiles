# window index start at 1, easier to prefix + number
set -g base-index 1
set -g renumber-windows on

# vim key bindings in copy mode
setw -g mode-keys vi

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
# set -sg escape-time 5

# mouse behavior
setw -g mouse on

# Use the system clipboard
set -g set-clipboard on

# Pass through image preview
set -gq allow-passthrough on

# Terminal
set -g default-terminal "${TERM}"
set -as terminal-features ',*:RGB'
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Don't detach on destroy, so that we can see the output of the last command
set -g detach-on-destroy off

set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80
set-window-option -g display-panes-time 1500

set-option -g focus-events on

# Update PATH for tmux run-shell, so that it can find fzf and other tools
set-option -g update-environment "PATH"

# Status Bar
set-option -g status-interval 5

# Set window notifications
setw -g monitor-activity off
set -g visual-activity off

if-shell '[ "$(uname -s)" = "Darwin" ]' ' \
  set-option -g default-command "reattach-to-user-namespace -l $SHELL"; \
'

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

## Automatically rename windows to match the current command
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-h"

# persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-resurrect' 
set -g @resurrect-capture-pane-contents 'on'
## https://github.com/tmux-plugins/tmux-resurrect/blob/master/docs/restoring_programs.md
set -g @resurrect-processes 'opencode "opencode --continue"'

# automatically saves sessions for you every 15 minutes; auto restore when tmux starts
set -g @plugin 'tmux-plugins/tmux-continuum' 
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-yank'
bind -T copy-mode    C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"

# Initialize TMUX plugin manager (keep the run line at the very bottom of tmux.conf)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'


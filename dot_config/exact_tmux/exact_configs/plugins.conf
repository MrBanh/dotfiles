set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-h"

# persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-resurrect' 
set -g @resurrect-capture-pane-contents 'on'
## https://github.com/tmux-plugins/tmux-resurrect/blob/master/docs/restoring_programs.md
set -g @resurrect-processes '\
      "gh dash" \
      lazygit \
      yazi \
      "~opencode->opencode *" \
      "~nvim->nvim *" \
      "~bend->bend *" \
'

# automatically saves sessions for you every 15 minutes; auto restore when tmux starts
set -g @plugin 'tmux-plugins/tmux-continuum' 
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-yank'
bind -T copy-mode    C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"

# Monitors AI coding agents (opencode/claude/codex) across panes
# Install note: on `prefix + I` the wizard offers "Download binary" or "Build
# from source". Prefer "Build from source" (needs cargo) — the released binary
# is unverified (no checksum/signature).
set -g @plugin 'hiroppy/tmux-agent-sidebar'
# Don't auto-inject a sidebar into every new window: it would split into the
# floating-tmux popup (C-_) and fight tmux-resurrect/continuum restores.
# Toggle manually instead:
#   prefix + e   toggle sidebar in the current window
#   prefix + E   toggle sidebar in all windows
set -g @sidebar_auto_create off

# Initialize TMUX plugin manager (keep the run line at the very bottom of tmux.conf)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'


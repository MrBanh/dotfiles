# When a session closes, kill its corresponding window in floating-tmux if one exists
set-hook -g session-closed "run-shell \"tmux kill-window -t 'floating-tmux:#{hook_session_name}' 2>/dev/null || true\""

# Give the floating-tmux session a full-width centered window list with a blank padding row on top
set-hook -g session-created {
  if-shell -F '#{==:#{hook_session_name},floating-tmux}' {
    set -t floating-tmux status 2
    set -t floating-tmux 'status-format[1]' '#[align=absolute-centre]#{W:#{E:window-status-format}#{?window_end_flag,,#{E:window-status-separator}},#{E:window-status-current-format}#{?window_end_flag,,#{E:window-status-separator}}}#[default]'
  }
  if-shell -F '#{m:sidekick|*,#{hook_session_name}}' {
    run-shell "tmux set-option -t '#{hook_session_name}' status off"
  }
}

# Make the tmux-agent-sidebar ephemeral inside sidekick.nvim sessions: when you
# navigate away from a "sidekick|*" session, hide its sidebar. Sidebars in normal
# sessions are left alone, so they persist when you leave and return. We pass the
# session just LEFT (#{client_last_session}); the helper no-ops for non-sidekick.
# Drop the old after-split-window enforcement and remove our prior copy first so
# re-sourcing stays idempotent.
run-shell 'tmux show-hooks -g after-split-window | awk "/sidekick-(kill|hide)-sidebar/ { print \$1 }" | xargs -rn1 tmux set-hook -gu'
run-shell 'tmux show-hooks -g client-session-changed | awk "/sidekick-hide-sidebar/ { print \$1 }" | xargs -rn1 tmux set-hook -gu'
set-hook -ga client-session-changed 'run-shell -b "~/.config/tmux/scripts/sidekick-hide-sidebar.sh \"#{client_last_session}\""'

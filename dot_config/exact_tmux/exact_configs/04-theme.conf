set -g @plugin 'tmux-plugins/tmux-cpu'

## Theme colors (Everforest palette, matching NvChad base46 everforest)
set -gq @thm_red "#e67e80"
set -gq @thm_purple "#ecafcc"
set -gq @thm_peach "#e69875"
set -gq @thm_yellow "#dbbc7f"
set -gq @thm_green "#83c092"
set -gq @thm_blue "#7393b3"
set -gq @thm_text "#d3c6aa"
set -gq @thm_line "#3a4248"

## Status bar style (transparent background)
set -g status-style "bg=default,fg=#{@thm_text}"
set -g status-position top

## Pane border
set -g pane-border-status off
set -g pane-border-format ""
set -g pane-border-lines single
set -g pane-border-indicators off
set -g pane-border-style "fg=#{@thm_line}"
set -g pane-active-border-style "fg=#{@thm_line}"

## Window status (centered)
set -g status-justify "absolute-centre"
set -g window-status-format "#[bg=default,fg=#{@thm_peach}]#{?#{!=:#{window_name},}, #I: #{?#{e|>:#{n:window_name},20},#{=10:window_name}…#{=-9:window_name},#{window_name}},} "
set -g window-status-current-format "#[bg=#{@thm_peach},fg=#{@thm_line},bold] #{?#{!=:#{window_name},},#I: #{window_name},} "
set -g window-status-separator "#[bg=default,fg=#{@thm_line}]│"

## Left status
set -g status-left-length 100
set -g status-left " "
set -ga status-left "#{?client_prefix,#[fg=#{@thm_purple}]󰇘 PREFIX,#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow}] COPY  ,#[fg=#{@thm_blue} blink]█ #[noblink]NORMAL}} "
set -ga status-left "#[bg=default,fg=#{@thm_green}]   #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_red}]   #S "

## Right status
set -g status-right-length 100
set -g status-right ""

### https://github.com/tmux-plugins/tmux-cpu
set -g @cpu_icon " "
set -g @cpu_low_icon " "
set -g @cpu_medium_icon " "
set -g @cpu_high_icon " "
set -ga status-right "#[bg=default,fg=#{@thm_red}] #{cpu_icon} #{cpu_percentage} "
set -g @ram_icon " "
set -g @ram_low_icon " "
set -g @ram_medium_icon " "
set -g @ram_high_icon " "
set -ga status-right "#[bg=default,fg=#{@thm_green}] #{ram_icon} #{ram_percentage} "
set -g @gpu_icon " "
set -g @gpu_low_icon " "
set -g @gpu_medium_icon " "
set -g @gpu_high_icon " "
set -ga status-right "#[bg=default,fg=#{@thm_blue}] #{gpu_icon} #{gpu_percentage} "
set -ga status-right " "

## Popup style
set -g popup-style bg=default
set -g popup-border-style "fg=#{@thm_line}"

## Add padding to top of status
if -F '#{!=:#{status},3}' {
  # Creates 3-line status bar
  set -g status 3

  # sets second (middle) line to the tmux status from the first line
  set -Fg 'status-format[1]' '#{status-format[0]}'

  # set first and third lines to empty, giving us a "padding"
  set -g status-format[0] ''
  set -g status-format[2] ''
}


# When a session closes, kill its corresponding window in floating-tmux if one exists
set-hook -g session-closed "run-shell \"tmux kill-window -t 'floating-tmux:#{hook_session_name}' 2>/dev/null || true\""

# Give the floating-tmux session a full-width centered window list with a blank padding row on top
set-hook -g session-created {
  if-shell -F '#{==:#{hook_session_name},floating-tmux}' {
    set -t floating-tmux status 3
    set -t floating-tmux 'status-format[0]' ''
    set -t floating-tmux 'status-format[1]' '#[align=absolute-centre]#{W:#{E:window-status-format}#{?window_end_flag,,#{E:window-status-separator}},#{E:window-status-current-format}#{?window_end_flag,,#{E:window-status-separator}}}#[default]'
    set -t floating-tmux 'status-format[2]' ''
  }
}
